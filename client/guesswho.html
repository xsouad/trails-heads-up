<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trails Guess Who</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="guesswho.css">
</head>
<body>

<div class="mode-switcher">
  <a class="mode-btn" href="/">Trails Heads Up</a>
  <a class="mode-btn active" href="/guesswho">Trails Guess Who</a>
  <a class="mode-btn" href="/wavelength">Trails Wavelength</a>
</div>

<div id="app-guesswho">
  <div id="gwNoticeBar"></div>

  <div class="screen active" id="gwScreen">
    <h1>Trails Guess Who</h1>
    <div id="gwTopBlurb">
      <p class="subtitle">Pick a secret character. Ask yes or no questions. Guess who they've got first.</p>
      <button type="button" id="gwHowToPlayBtn" class="how-to-play-link">How to Play</button>
    </div>

    <div id="gwRoot"></div>
  </div>
</div>

<div class="zoom-overlay" id="gwHowToPlayOverlay">
  <div class="how-to-play-card">
    <button class="close-btn how-to-play-close" id="gwHowToPlayCloseBtn">Close</button>
    <div class="how-to-play-viewer">
      <button class="how-to-play-arrow how-to-play-prev" id="gwHowToPlayPrevBtn" aria-label="Previous page">&lt;</button>
      <img id="gwHowToPlayImg" src="" alt="How to Play">
      <button class="how-to-play-arrow how-to-play-next" id="gwHowToPlayNextBtn" aria-label="Next page">&gt;</button>
    </div>
    <div class="how-to-play-pagecount" id="gwHowToPlayPageCount"></div>
  </div>
</div>

<script src="avatar-shared.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="guesswho.js"></script>
</body>
</html>
